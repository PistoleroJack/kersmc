<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info & IP - KersMC</title>
    <link rel="icon" type="image/png" href="KersMC_logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.3/css/bulma.min.css">
    <style>
        .section {
            padding: 30px 10%;
            text-align: center;
        }
        .title {
            font-size: 3rem;
        }
        .subtitle {
            font-size: 2rem;
        }
        .copy-box {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            border: 2px solid black;
            border-radius: 5px;
            cursor: pointer;
            background-color: #f4f4f4;
        }
        .copy-box:hover {
            background-color: #ddd;
        }
        .red-line {
            width: 80%;
            height: 4px;
            background-color: #A0C213;
            margin: 30px auto;
        }
    </style>
</head>
<body>
    <section class="section">
        <h1 class="title">IP</h1>
        <div class="columns">
            <div class="column has-text-centered">
                <h2 class="subtitle">Java</h2>
                <div class="copy-box" onclick="copyToClipboard('play.kersmc.nl')">IP: play.kersmc.nl</div>
            </div>
            <div class="column has-text-centered">
                <h2 class="subtitle">Bedrock</h2>
                <div class="copy-box" onclick="copyToClipboard('play.kersmc.nl')">IP: play.kersmc.nl</div>
                <div class="copy-box" onclick="copyToClipboard('38364')">Poort: 38364</div>
            </div>
        </div>
        <div class="red-line"></div>
        <h1 class="title">Regels</h1>
    </section>

    <script>
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Gekopieerd: ' + text);
            }).catch(err => {
                console.error('Fout bij kopiëren:', err);
            });
        }
    </script>
</body>
</html>

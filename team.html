<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KersMC - Het Team</title>
    <link rel="icon" type="image/png" href="KersMC_logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.3/css/bulma.min.css">
    <style>
        .header-bar {
            background-color: #A0C213;
            color: black;
            padding: 60px 10%;
            text-align: center;
            position: relative;
        }
        .header-bar h1 {
            font-size: 4rem;
        }
        .header-bar .button {
            margin: 10px;
        }
        .footer {
            text-align: center;
            padding: 10px;
            background-color: #f4f4f4;
        }
        .team-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 30px 10%;
        }
        .team-member {
            text-align: center;
            width: 300px;
        }
        .team-member img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
        }
        .team-member h2 {
            margin-top: 10px;
            font-size: 1.5rem;
        }
        .team-member h3 {
            font-size: 1.2rem;
            color: gray;
        }
    </style>
</head>
<body>
    <section class="header-bar">
        <h1 class="title is-1"><a href="/kersmc" style="color: black; text-decoration: none;">KersMC</a></h1>
        <button class="login-button" id="loginButton">Login</button>
        <div class="buttons-container">
            <a href="/kersmc/info" class="button is-light">Info & IP</a>
            <a href="/kersmc/content" class="button is-light">KersMC content</a>
            <a href="/kersmc/discord" class="button is-light">Discord server</a>
            <a href="/kersmc/team" class="button is-light">Het team</a>
        </div>
    </section>

    <section class="team-container">
        <div class="team-member">
            <img src="Tieskuhh.png" alt="Tieskuhh">
            <h2>Tieskuhh</h2>
            <h3>Eigenaar</h3>
            <p><><></p>
        </div>
        <div class="team-member">
            <img src="Tijn.png" alt="Tijn">
            <h2>Tijn</h2>
            <h3>Eigenaar</h3>
            <p><><></p>
        </div>
        <div class="team-member">
            <img src="Marskoenker.png" alt="MarsKoenker">
            <h2>MarsKoenker</h2>
            <h3>Hoofd Moderator</h3>
            <p><><></p>
        </div>
        <div class="team-member">
            <img src="Noëlvdsterren.jpeg" alt="Noëlvdsterren">
            <h2>Noëlvdsterren</h2>
            <h3>Moderator</h3>
            <p><><></p>
        </div>
        <div class="team-member">
            <img src="Juultieee.jpeg" alt="xJuultieee_">
            <h2>xJuultieee_</h2>
            <h3>Moderator</h3>
            <p><><></p>
        </div>
        <div class="team-member">
            <img src="Pistolerojack.jpg" alt="Pistolerojack">
            <h2>Pistolerojack</h2>
            <h3>Moderator</h3>
            <p><><></p>
        </div>
    </section>

    <footer class="footer">
        <p>© 2025 KersMC. Alle rechten voorbehouden.</p>
    </footer>
</body>
</html>

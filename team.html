<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KersMC - Het Team</title>
    <link rel="icon" type="image/png" href="KersMC_logo.png"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.3/css/bulma.min.css"> 
    <style>
        .header-bar {
            background-color: #A0C213;
            color: black;
            padding: 20px;
            text-align: center;
        }
        .header-bar h1 {
            font-size: 3rem;
        }
        .buttons-container {
            margin-top: 10px;
        }
        .buttons-container a {
            margin: 5px;
        }
        .login-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: white;
            color: black;
            border: 1px solid black;
            padding: 10px 15px;
            cursor: pointer;
        }
        .section {
            padding: 30px 10%;
        }
        .team-member {
            text-align: center;
            padding: 20px;
        }
        .team-member img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }
        .footer {
            text-align: center;
            padding: 10px;
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>
    <section class="header-bar">
        <h1 class="title is-1"><a href="/kersmc" style="color: black; text-decoration: none;">KersMC</a></h1>
        <button class="login-button" id="loginButton">Login</button>
        <div class="buttons-container">
            <a href="/kersmc/info" class="button is-light">Info & IP</a>
            <a href="/kersmc/content" class="button is-light">KersMC Content</a>
            <a href="/kersmc/discord" class="button is-light">Discord Server</a>
            <a href="/kersmc/team" class="button is-light">Het Team</a>
        </div>
    </section>

    <section class="section">
        <div class="columns is-multiline is-centered">
            <div class="column is-half team-member">
                <img src="Tieskuhh.png" alt="Tieskuhh">
                <h2 class="title is-4">Tieskuhh</h2>
                <p class="subtitle is-6">Eigenaar</p>
                <p><><></p>
            </div>
            <div class="column is-half team-member">
                <img src="Tijn.png" alt="Tijn">
                <h2 class="title is-4">Tijn</h2>
                <p class="subtitle is-6">Eigenaar</p>
                <p><><></p>
            </div>
            <div class="column is-half team-member">
                <img src="Marskoenker.png" alt="MarsKoenker">
                <h2 class="title is-4">MarsKoenker</h2>
                <p class="subtitle is-6">Hoofd Moderator</p>
                <p><><></p>
            </div>
            <div class="column is-half team-member">
                <img src="Noëlvdsterren.jpeg" alt="Noëlvdsterren">
                <h2 class="title is-4">Noëlvdsterren</h2>
                <p class="subtitle is-6">Moderator</p>
                <p><><></p>
            </div>
            <div class="column is-half team-member">
                <img src="Juultieee.jpeg" alt="xJuultieee_">
                <h2 class="title is-4">xJuultieee_</h2>
                <p class="subtitle is-6">Moderator</p>
                <p><><></p>
            </div>
            <div class="column is-half team-member">
                <img src="Pistolerojack.png" alt="Pistolerojack">
                <h2 class="title is-4">Pistolerojack</h2>
                <p class="subtitle is-6">Moderator</p>
                <p><><></p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>© 2025 KersMC. Alle rechten voorbehouden.</p>
    </footer>
</body>
</html>

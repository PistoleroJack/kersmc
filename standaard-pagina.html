<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KersMC</title>
    <link rel="icon" type="image/png" href="KersMC_logo.png"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.3/css/bulma.min.css">
    <style>
        .header-bar {
            background-color: #A0C213;
            color: black;
            padding: 30px 10%;
            text-align: center;
        }
        .header-bar h1 {
            font-size: 3rem;
            margin: 0;
        }
        .buttons-container {
            margin-top: 10px;
        }
        .header-bar .button {
            margin: 5px;
        }
        .login-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: white;
            color: black;
            border: 1px solid black;
            padding: 5px 10px;
            cursor: pointer;
        }
        .section {
            text-align: center;
            padding: 50px;
            font-size: 1.5rem;
        }
        .footer {
            text-align: center;
            padding: 10px;
            background-color: #f4f4f4;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <section class="header-bar">
        <h1 class="title is-1"><a href="/kersmc" style="color: black; text-decoration: none;">KersMC</a></h1>
        <button class="login-button" onclick="window.location.href='/kersmc/login'">Login</button>
        <div class="buttons-container">
            <a href="/kersmc/info" class="button is-light">Info & IP</a>
            <a href="/kersmc/content" class="button is-light">KersMC Content</a>
            <a href="/kersmc/discord" class="button is-light">Discord Server</a>
            <a href="/kersmc/team" class="button is-light">Het Team</a>
        </div>
    </section>

    <section class="section">
        <p>Aan deze pagina wordt nog gewerkt.</p>
    </section>

    <footer class="footer">
        <p>© 2025 KersMC. Alle rechten voorbehouden.</p>
    </footer>
</body>
</html>
